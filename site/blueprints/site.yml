title: Site

tabs:
  pages:
    label: Pages
    icon: document
    sections:
      pages:
        type: pages
        layout: deck
  settings_footer:
    label: Footer
    icon: gear
    columns:
      - width: 3/3
        fields:
          global_cta_title:
            label: Footer Title
            type: text
            placeholder: "Beispiel: Du möchtest uns kennenlernen?"
          global_cta_text:
            label: Footer Text
            type: textarea
            buttons: false
  settings_banner:
      label: Audition banner
      icon: banner
      columns:
        - width: 3/3
          fields:
            global_audition_banner_active:
              label: Are audition open?
              type: toggle
              text: 
                - "Disattivato"
                - "Attivo"
            global_audition_banner_title:
              label: Banner audition text
              type: text
              placeholder: "Beispiel: Audition 2025 sind jetzt online!"
            global_audition_banner_link:
              label: Banner audition link
              type: text
              buttons: false
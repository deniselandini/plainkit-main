title: Education
icon: book

tabs:
  content:
    label: Page Content
    fields:
      # --- SECTION 1: HEADER & INTRO ---
      section_header_label:
        label: 1. Header & Intro
        type: headline

      header_headline:
        label: Main Headline
        type: text

      header_image:
        label: Header Image (.png, .jpg, .jpeg)
        type: files
        help: "Square format (1:1) and phone (16:9), 1200x1200px and phone 1280x720 recommended. Max file size: 1.5MB."
        max: 1
        query: page.images

      # --- SECTION 2: INTRO TEXTS ---
      line_1:
        type: line
      section_intro_label:
        label: 2. Introduction Texts
        type: headline

      intro_text_left:
        label: Intro Text (left side)
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol
        width: 1/2

      intro_text_right:
        label: Intro Text (right side)
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol
        width: 1/2

      # --- SECTION 3: AUDITION BANNER ---
      line_2:
        type: line
      section_audition_label:
        label: 3. Audition Banner (Loop)
        type: headline

      audition_text:
        label: Banner Text
        type: text
        help: e.g. THE AUDITION DATES 2025 ARE NOW ONLINE.

      audition_link_text:
        label: Link Text
        type: text
        help: e.g. REGISTER NOW

      # --- SECTION 4: INTERACTIVE SUBJECT (BALLS) ---
      line_3:
        type: line
      section_subjects_balls_label:
        label: 3. Subjects balls
        type: headline

      subjects_ball_0_title:
        label: Default title
        type: text

      subjects_ball_0_description:
        label: Default description
        type: text

      subjects_ball_1_title:
        label: Subject group 1 title (the biggest ball)
        type: text

      subjects_ball_1_description:
        label: Subject group 1 description (the biggest ball)
        type: text

      subjects_ball_2_title:
        label: Subject group 2 title
        type: text

      subjects_ball_2_description:
        label: Subject group 2 description
        type: text

      subjects_ball_3_title:
        label: Subject group3  title
        type: text

      subjects_ball_3_description:
        label: Subject group 3 description
        type: text

      
      subjects_ball_4_title:
        label: Subject group 4 title
        type: text

      subjects_ball_4_description:
        label: Subject group 4 description
        type: text

      
      subjects_ball_5_title:
        label: Subject group 5 title (the smallest ball)
        type: text

      subjects_ball_5_description:
        label: Subject group 5 description (the smallest ball)
        type: text

      # --- SECTION 5: SUBJECTS SELECTOR ---
      line_4:
        type: line
      section_subjects_label:
        label: 4. Subjects List
        type: headline

      subjects_list:
        label: Subjects List
        type: structure
        columns:
          name: 1/4
          teacher: 1/4
          categories: 1/2
        fields:
          id:
            label: Slug/ID
            type: text
            width: 1/2
          name:
            label: Subject Name
            type: text
            width: 1/2
          teacher:
            label: Teacher Name
            type: text
          description:
            label: Description
            type: textarea
            buttons: 
              - bold
              - italic
              - ul
              - ol
          image:
            label: Subject Image (.png, .jpg, .jpeg)
            type: files
            help: "Portrait (2:3), 1000x1500px recommended. Max 1MB."
            max: 1
          categories:
            label: Category (Select from list)
            help: |
                This section is managed from the Categories section.
                To update it:
                1) Go to the top of this page 
                2) Click on "Categories"
                3) Edit the entries
                4) Save your changes
            type: multiselect
            options: query
            query:
              fetch: page.categories_manager.toStructure
              text: "{{ item.category_name }}"
              value: "{{ item.category_name }}"

     # --- SECTION 6: PROGRAM STRUCTURE ---
      line_5:
        type: line
      section_program_structure:
        label: 5. Program Structure & Requirements
        type: headline

      program_structure_title:
        label: Structure Section Title
        type: text
        placeholder: e.g. Aufbau & Struktur

      program_structure_intro:
        label: Program Intro Paragraph
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol
        help: Text about the 3-year duration and requirements.

      program_structure_details:
        label: Program Details Paragraph
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol
        help: Text about credits (ECTS) and previous studies.

      # --- SECTION 7: AUSBUILDUNG (3 years program) ---
      line_6:
        type: line
      section_split:
        label: 6. Ausbildung Years
        type: headline
      firstYear_headline:
        label: First year Headline
        type: text
      firstYear_level:
        label: First year Level
        type: text
      firstYear_description:
        label: First year Description
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol
      secondYear_headline:
        label: Second year Headline
        type: text
      secondYear_level:
        label: Second year Level
        type: text
      secondYear_description:
        label: Second year Description
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol

      thirdYear_headline:
        label: Third year Headline
        type: text
      thirdYear_level:
        label: Third year Level
        type: text
      thirdYear_description:
        label: Third year Description
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol

      # --- SECTION 8: COSTS ---
      line_7:
        type: line
      section_structure_label:
        label: 7. Costs
        type: headline

      costs_headline:
        label: Costs Headline
        type: text
      costs_text:
        label: Costs Description
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol

      # --- SECTION 9: FORTBUILDUNG ---
      line_8:
        type: line
      section_fortbuildung_label:
        label: 8. Fortbuildung
        type: headline

      fortbuildung_headline:
        label: Fortbuildung Headline
        type: text

      fortbuildung_overview:
        label: Fortbuildung Overview & Mission
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol

      fortbuildung_schedule:
        label: Fortbuildung Schedule & Curriculum
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol

      fortbuildung_requirement:
        label: Fortbuildung Requirement & Enrollment
        type: textarea
        buttons: 
          - bold
          - italic
          - ul
          - ol

      fortbuildung_image:
        label: Fortbuildung Image (.png, .jpg, .jpeg)
        type: files
        max: 1
        help: "Portrait (2:3), 1000x1500px recommended. Max 1MB."
        query: page.images

      # --- SECTION 10: AKTUELLES ---
      line_9:
        type: line
      section_aktuelles:
        label: 9. Aktuelles
        type: headline
      aktuelles_headline:
        label: Aktuelles Headline
        help: |
          This section is managed from News page.
          To update it:
          1) Go to "Site"
          2) Click on "Pages" -> "news"
          3) Edit the entries in "3. News Feed"
          4) Save your changes
        type: text
        

      # --- SECTION 11: FOOTER CTA ---
      line_10:
        type: line
      footer_cta:
        extends: fields/footer_cta

  # --- TAB SETTINGS ---
  settings:
    label: Categories
    fields:
      section_settings_label:
        label: Manage Categories
        type: headline
      categories_manager:
        label: Available Categories
        type: structure
        fields:
          category_id:
            label: ID
            type: text
          category_name:
            label: Category Name
            type: text


  # --- IMAGE MANAGEMENT ---
  media:
    label: Images Management
    icon: image
    sections:
      all_images:
        label: Education Images
        type: files
        layout: cards
        info: "{{ file.dimensions }}"